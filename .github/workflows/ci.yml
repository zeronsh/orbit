name: ci

# Runs on Blacksmith runners. Upstream cache actions (setup-node/rust-cache) are
# transparently accelerated by Blacksmith's in-datacenter cache — no fork needed.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  js:
    runs-on: blacksmith
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Guard: the npm package version and the Rust workspace version must match.
      - run: node scripts/sync-versions.mjs --check
      - run: pnpm --filter @zeronsh/orbit typecheck
      - run: pnpm --filter @zeronsh/orbit test
      - run: pnpm --filter @zeronsh/orbit build

  rust:
    runs-on: blacksmith
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Postgres with logical replication for the orbit-cache integration tests
      # (they connect to 127.0.0.1:5433 as user/db `orbit`). Mirrors
      # apps/demo/docker-compose.yml and reuses the repo's pg_hba init script —
      # POSTGRES_HOST_AUTH_METHOD=trust doesn't cover the `replication` category.
      - name: Start Postgres (logical replication)
        run: |
          docker run -d --name orbit-pg \
            -e POSTGRES_USER=orbit \
            -e POSTGRES_DB=orbit \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 5433:5432 \
            -v "$PWD/apps/demo/postgres/00-hba.sh:/docker-entrypoint-initdb.d/00-hba.sh" \
            postgres:18 \
            -c wal_level=logical -c max_wal_senders=20 -c max_replication_slots=20
          # Wait for the FINAL server (TCP). pg_isready over TCP fails during the
          # entrypoint's socket-only init phase, so this won't pass prematurely.
          for i in $(seq 1 60); do
            if docker exec orbit-pg pg_isready -h 127.0.0.1 -p 5432 -U orbit -d orbit >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready" >&2
          docker logs orbit-pg || true
          exit 1
      - run: cargo check --all-targets
      - run: cargo test --workspace
      # Advisory: surfaces clippy lints without failing CI (newer clippy versions
      # add lints over time). Enforce locally with `pnpm lint` (clippy -D warnings).
      - name: clippy (advisory)
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
