name: release

# One pipeline that publishes everything in lockstep, on Blacksmith runners:
#  - `release` job: changesets opens/updates a "Version Packages" PR; merging it
#    publishes @zeronsh/orbit to npm. `version-packages` also syncs the Rust
#    workspace version (scripts/sync-versions.mjs), so the binary + image carry
#    the same version as the npm package.
#  - `docker` job: ONLY on an actual publish, builds + pushes
#    ghcr.io/zeronsh/orbit-server tagged `vX.Y.Z` + `latest` — the SAME version as
#    the npm package. `latest` therefore always equals the latest published
#    @zeronsh/orbit (no unversioned drift).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      republish_image_version:
        description: "Published version whose GHCR image should be rebuilt (for example, 0.3.12)"
        type: string
        required: false

jobs:
  release:
    runs-on: blacksmith
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm provenance
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @zeronsh/orbit build
      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - id: version
        if: steps.changesets.outputs.published == 'true'
        run: echo "version=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"

  docker:
    needs: release
    # Only build/push when a version was actually published, and tag it with that
    # exact version — so the image and the npm package are always the same version.
    if: needs.release.outputs.published == 'true'
    runs-on: blacksmith
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zeronsh/orbit-server
          tags: |
            type=raw,value=v${{ needs.release.outputs.version }}
            type=raw,value=latest
      - uses: useblacksmith/build-push-action@v1
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # A package publish can succeed before a transient GitHub/tag push failure.
  # In that state Changesets correctly refuses to republish npm, so the normal
  # `published` output stays false and the Docker job above remains skipped.
  # This manual path rebuilds the matching immutable image without minting a
  # duplicate package version.
  docker-recovery:
    if: github.event_name == 'workflow_dispatch' && inputs.republish_image_version != ''
    runs-on: blacksmith
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zeronsh/orbit-server
          tags: |
            type=raw,value=v${{ inputs.republish_image_version }}
            type=raw,value=latest
      - uses: useblacksmith/build-push-action@v1
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
