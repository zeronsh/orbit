# 512 MB acceptance harness: proves an Orbit cluster stays inside a 512 MB
# container under a 200 MB compressible dataset, individual 10 MB rows, large
# full-history hydrations, a stalled change-log, and reconnect churn.
# Driven by scripts/acceptance/run.sh — don't `up` this by hand unless you
# also run the seed/stall/assert steps.

# Static IPs (orbitnet): Docker Desktop's embedded DNS drops lookups under
# sustained bulk transfer (hundreds of MB through the bridge), which wedged
# runs on name resolution — an infra quirk, not Orbit behavior. Fixed
# addresses keep the harness deterministic on any Docker.
networks:
  orbitnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:
  pg-source:
    image: postgres:18
    command:
      ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=20", "-c", "max_replication_slots=20"]
    environment:
      POSTGRES_USER: orbit
      POSTGRES_DB: orbit
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      orbitnet:
        ipv4_address: 172.28.0.10
    volumes:
      - ../../apps/demo/postgres/00-hba.sh:/docker-entrypoint-initdb.d/00-hba.sh
    ports:
      - "25460:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      orbitnet:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD-SHELL", "mc --version >/dev/null 2>&1 || curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://172.28.0.11:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/orbit-acceptance
      "
    networks:
      - orbitnet

  replicator:
    image: orbit-acceptance:local
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    command: ["orbit-node"]
    depends_on:
      pg-source:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: &orbit-env
      # Role keys below are the replicator's; view-syncers override them via
      # the YAML merge (explicit keys win over `<<`).
      ORBIT_ROLE: replicator
      ORBIT_CHANGE_STREAM_ADDR: "[::]:4000"
      ORBIT_PG_HOST: 172.28.0.10
      ORBIT_PG_PORT: "5432"
      ORBIT_PG_USER: orbit
      ORBIT_PG_DB: orbit
      ORBIT_TABLES: acc_small:id,acc_big:id
      ORBIT_BUCKET: orbit-acceptance
      AWS_ENDPOINT_URL: http://172.28.0.11:9000
      AWS_REGION: auto
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      ORBIT_REPLICA: sqlite
      ORBIT_REPLICA_DIR: /data
      ORBIT_REPLICA_CACHE_MB: "64"
      ORBIT_METRICS_LISTEN: 0.0.0.0:9090
      ORBIT_SNAPSHOT_INTERVAL: "30"
      RUST_BACKTRACE: "1"
    # THE POINT: hard 512 MB ceiling, no swap escape hatch.
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      orbitnet:
        ipv4_address: 172.28.0.20
    ports:
      - "25461:9090" # metrics/ready
    healthcheck: &ready-check
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9090/ready || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 60
      start_period: 60s

  view-syncer-1:
    image: orbit-acceptance:local
    command: ["orbit-node"]
    depends_on:
      replicator:
        condition: service_healthy
    environment:
      <<: *orbit-env
      ORBIT_ROLE: view-syncer
      ORBIT_CHANGE_STREAM_ADDR: 172.28.0.20:4000
      ORBIT_LISTEN: 0.0.0.0:4848
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      orbitnet:
        ipv4_address: 172.28.0.21
    ports:
      - "25462:4848"
      - "25463:9090"
    healthcheck: *ready-check

  view-syncer-2:
    image: orbit-acceptance:local
    command: ["orbit-node"]
    depends_on:
      replicator:
        condition: service_healthy
    environment:
      <<: *orbit-env
      ORBIT_ROLE: view-syncer
      ORBIT_CHANGE_STREAM_ADDR: 172.28.0.20:4000
      ORBIT_LISTEN: 0.0.0.0:4848
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      orbitnet:
        ipv4_address: 172.28.0.22
    ports:
      - "25464:4848"
      - "25465:9090"
    healthcheck: *ready-check

  loadgen:
    image: orbit-acceptance:local
    command: ["orbit-loadgen"]
    profiles: ["load"] # started explicitly by run.sh once the cluster is ready
    depends_on:
      view-syncer-1:
        condition: service_healthy
      view-syncer-2:
        condition: service_healthy
    environment:
      LOADGEN_WS: 172.28.0.21:4848,172.28.0.22:4848
      LOADGEN_CLIENTS: "6"
      LOADGEN_DURATION: "180"
      LOADGEN_EXPECT: acc_small=20000,acc_big=5
      LOADGEN_CHURN_PCT: "30"
      LOADGEN_HYDRATIONS: "2"
      RUST_BACKTRACE: "1"
    networks:
      - orbitnet
